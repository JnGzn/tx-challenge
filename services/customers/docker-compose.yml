name: arkano-customers

networks:
  arkano-net:
    external: true
    name: arkano-net-1

volumes:
  pg-customers-data:

services:
  postgres-customers:
    image: postgres:16-alpine
    container_name: postgres-customers
    networks: [arkano-net]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: customers
    ports:
      - "5432:5432"
    volumes:
      - pg-customers-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d customers"]
      interval: 5s
      timeout: 5s
      retries: 10

  customers:
    build:
      context: .
    container_name: customers
    networks: [arkano-net]
    restart: unless-stopped
    depends_on:
      postgres-customers:
        condition: service_healthy
    environment:
      HTTP_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres-customers:5432/customers?schema=public
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: customers-service
      KAFKA_GROUP_ID: customers-consumer
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/main.js"]
    ports:
      - "3001:3000"
